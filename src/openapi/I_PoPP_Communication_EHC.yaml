openapi: 3.1.0
info:
  title: PoPP-FdV
  description: |
    This interface is for communication eHealth-Card with PoPP-Service.</br>
    PoPP-Service is opening a communication channel to send APDU-Commands to the eHealth-Card.
    PoPP-Server is validate eHealth-Card answers. Is the communication successful finished PoPP-Server create an 
    OTP-Challenge for the PoPP-FdV.

    **General conditions**:</br> 
    For all operations if applicable:
    - error responses may be extended by helpful information about the error condition in _errorDetail_

    **Prerequisites**:</br>
    For insurant and representatives
    - The popp-fdv client has read public data from eHealth-Card
    - The popp authorization server has issued a card-communication access token to the popp-fdv client
    
    
    **Retry interval**:</br>
    The following retry intervals are suggested in case of an error response:<br>
    - '500' Internal Error
      - approx. 10 minutes

  contact:
    name: gematik GmbH
    url: 'https://www.gematik.de'

  license:
    name: Apache 2.0
    url: 'https://www.apache.org/licenses/LICENSE-2.0'

  version: 0.0.1

  # version history:
  # ----------------
  # version 0.0.1
  #   - initial version for review

servers:
- url: https://popp-service.de

tags:
- name: eHealth-Card communication
  description: |
   todo ..

   If the eHealth-Card communication was successful, PoPP-Service send an OTP-Challenge to PoPP-FdV.
  
  
- name: OTPChallenge
  description: |
   todo
   
   If the validation of the popp-fdv access token was successful, PoPP-Service send an OTP-Challenge to PoPP-FdV. 
   

externalDocs:
  description: 'Specification: gemSpec_PoPP_Service, gemSpec_PoPP_FdV'
  url: https://gemspec.gematik.de/docs/gemSpec/

paths:
  /popp/service/v1/sendEHCCommunicationRequest:
    parameters:
      - $ref: '#/components/parameters/useragent'
    post:
      tags:
        - eHealth-Card communication
      operationId: sendEHCCommunicationRequest
      summary: (sendEHCCommunicationRequest) Send todo ....
      externalDocs:
        description: 'gemSpec_popp_service, Kapitel 3.3.2 Authentisierung des Versicherten mit eGK (mobil)'
        url: https://gemspec.gematik.de/docs/gemSpec/
      description: | 
        todo

      requestBody:
        description: >-
            card-communication access token
        required: true
        content: 
          application/json:
           schema: 
             $ref: '#/components/schemas/CardCommunicationAccessTokenSchema'
      
      responses:
        '200':
          $ref: '#/components/responses/CardCommunicationResponse200'
        '400':
          $ref: '#/components/responses/Error400BadRequest'
        '403':
          $ref: '#/components/responses/Error403Forbidden'
        '500':
          $ref: '#/components/responses/Error500InternalError'

  /popp/service/v1/getOTPChallenge:
    parameters:
      - $ref: '#/components/parameters/useragent'
    post:
      tags:
        - OTPChallenge
      operationId: getOTPChallenge
      summary: (getOTPChallenge) Get ...
      externalDocs:
        description: 'gemSpec_popp_service, Kapitel 3.3.2 Authentisierung des Versicherten mit eGK (mobil)'
        url: https://gemspec.gematik.de/docs/gemSpec/
      description: | 
        todo
      requestBody:
        description: >-
            Authorization Request is an OAuth complaint request used Proof Key for Code Exchange by OAuth Public Clients (see https://datatracker.ietf.org/doc/html/rfc763).
        required: true
        content: 
          application/json:
           schema: 
             $ref: '#/components/schemas/OTPChallengeSchema'
      
      responses:
        '200':
          $ref: '#/components/responses/OTPChallengeResponse200'
        '400':
          $ref: '#/components/responses/Error400BadRequest'
        '403':
          $ref: '#/components/responses/Error403Forbidden'
        '500':
          $ref: '#/components/responses/Error500InternalError'
      
  /popp/service/v1/sendInitializationResponse:
    parameters:
      - $ref: '#/components/parameters/useragent'
    post:
      tags:
        - Authorization gID
      operationId: sendInitializationResponse
      summary: (sendInitializationResponse) Send ...
      externalDocs:
        description: 'gemSpec_IDP_Sek, table "Authorization Request von Anwendungsfrontend zum Authorization-Server"'
        url: https://gemspec.gematik.de/docs/gemSpec/
      description: | 
       
      requestBody:
        description: >-
            Authorization Request is an OAuth complaint request used Proof Key for Code Exchange by OAuth Public Clients (see https://datatracker.ietf.org/doc/html/rfc763).
        required: true
        content: 
          application/json:
           schema: 
             $ref: '#/components/schemas/OTPInitializationSchema'
      
