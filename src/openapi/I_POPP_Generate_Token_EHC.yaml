openapi: 3.1.0
title: PoPP Token Generation API
description: |
  This interface provides access to PoPP Token Generation API.

components:
  schemas:
    StartMessage:
      type: object
      title: "Start proof process using electronic health card (EHC)"
      description: "Sent by the client to start the EHC proof process."
      properties:
        type:
          type: string
          const: "Start"
          description: "The constant type identifier for Start."
        version:
          type: integer
          description: "The version of the EHC proof process to use, chosen by the client. Server is expected to support this version."
        cardConnectionType:
          type: string
          enum: [ "contact", "contactless", "connector" ]
          description: "The type of connection the client is using to connect the smartcard."
        clientSessionId:
          type: string
          description: "A unique identifier for the client session, generated by the client. UUID v4 is recommended."
      examples:
        - type: "Start"
          version: 1
          cardConnectionType: "contact"
          clientSessionId: "123e4567-e89b-12d3-a456-426614174000"

      required:
        - type
        - version
        - cardConnectionType
        - clientSessionId

    ScenarioMessage:
      type: object
      title: "Sent by the server as a request to the client to execute a scenario on the smartcard."
      description: |
        Base64 encoded BER-TLV structure containing the scenario
        to be executed by the smartcard
      properties:
        type:
          type: string
          const: "Scenario"
          description: "The constant type identifier for Scenario."
        encoded:
          type: string
          description: "The encoded scenario data."
      required:
        - type
        - encoded

    ScenarioResponseMessage:
      type: object
      title: "ScenarioResponse"
      description: "Sent by the client in response to a Scenario message."
      properties:
        type:
          type: string
          const: "ScenarioResponse"
          description: "The constant type identifier for ScenarioResponse."
        responses:
          type: array
          items:
            type: string
            description: |
              Response from the smartcard encoded in hexadecimal characters.
              Contains at least 4 characters (status word).
          description: |
              The responses from the smartcard, one for each command in the scenario

      required:
        - type
        - responses

    ErrorMessage:
      type: object
      title: "Error"
      description: "Sent by the server to indicate an error."
      properties:
        type:
          type: string
          const: "Error"
          description: "The constant type identifier for Error."
        errorCode:
          type: string
          description: "The error code."
        errorDetail:
          type: string
          description: "A human-readable error message."
      required:
        - type
        - errorCode

    TokenMessage:
      type: object
      title: "Token"
      description: "Sent by the server to provide the client with a POPP token."
      properties:
        type:
          type: string
          const: "Token"
          description: "The constant type identifier for Token."
        token:
          type: string
          description: "POPP token as JWT compact serialization."
        pn:
          type: string
          description: "Prüfnachweis"
      
      required:
        - type
        - token
        - pn

    TokenClaims:
      type: object
      title: "POPP Token Claims"
      description: "Schema for the claims of a PoPP token as contained in the JWT."
      properties:
        iat:
          type: integer
          description: "The time the token was issued."
        version:
          type: integer
          description: "The version of the PoPP token format."
          const: 1
        proofMethod:
          type: string
          description: "The proof method used."
          enum:
            - practitioner-ehc-contact
            - practitioner-ehc-contactless
            - practitioner-ehc-connector
            - practitioner-healthid-otp
            - provider-ehc-contactless
        patientPoofTime:
          type: integer
          description: |
            The time the patient proof was performed.
            
            * For proof methods with EHC this is the time the EHC was used.
            * For proof methods with HealthID this is the time the identity 
            was verified using the OpenID Connect.
        patientId:
          type: string
          description: "The patient identifier (KVNR)."
        insurerId:
          type: string
          description: "The insurer identifier (IKNR)."
        actorId:
          type: string
          description: "The actor identifier (Telematik-ID)."
        actorProfessionOid:
          type: string
          description: "Profession OID of the actor."
      required:
        - iat
        - version
        - proofMethod
        - patientId
        - insurerId
        - actorId
        - actorProfessionOid