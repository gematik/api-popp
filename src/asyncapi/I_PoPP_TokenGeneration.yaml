asyncapi: 3.0.0
info:
  title: Generate PoPP Token
  version: 0.2.0
  description: |
    This service provides the API to generate and the Proof of Patient Presence Token. 

    * The client application acts as intermediary between the service and the smartcard.
    * The service sends the client a scenario to be executed on the smartcard.
    * The client sends the scenario to the smartcard using the appropriate hardware (card reader or konnektor).
    * The client sends the result of the scenario back to the service.
    * This procedure is repeated until the service has all the necessary information to generate the token.
    * The service then sends the token to the client.
servers:
  local:
    host: 127.0.0.1:8000
    protocol: ws
    pathname: /popp/practitioner/api/v1/token-websocket
  dev:
    host: popp26.t20r.cloud
    protocol: wss
    pathname: /popp/practitioner/api/v1/token-websocket

channels:
  Token:
    messages:
      Error:
        $ref: '#/components/messages/Error'
      ClientHello:
        $ref: '#/components/messages/ClientHello'
      Scenario:
        $ref: '#/components/messages/Scenario'    
      ScenarioResult:
        $ref: '#/components/messages/ScenarioResult'
      Token:
        $ref: '#/components/messages/Token'
      
operations:
  ReceiveError:
    action: receive
    channel:
      $ref: '#/channels/Token'
    messages:
      - $ref: '#/channels/Token/messages/Error'
  SendClientHello:
    action: send
    channel:
      $ref: '#/channels/Token'
    messages:
      - $ref: '#/channels/Token/messages/ClientHello'
  ReceiveScenario:
    action: receive
    channel:
      $ref: '#/channels/Token'
    messages:
      - $ref: '#/channels/Token/messages/Scenario'
  SendScenarioResult:
    action: send
    channel:
      $ref: '#/channels/Token'
    messages:
      - $ref: '#/channels/Token/messages/ScenarioResult'
  ReceiveToken:
    action: receive
    channel:
      $ref: '#/channels/Token'
    messages:
      - $ref: '#/channels/Token/messages/Token'
  
components:
  messages:
    Error:
      payload:
        title: ErrorPayload
        type: object
        additionalProperties: false
        properties:
          code:
            type: string
            description: The error code
          message:
            type: string
            description: The error message
        required:
          - code
          - message
    ClientHello:
      payload:
        title: ClientHelloPayload
        type: object
        additionalProperties: false
        properties:
          clientApiVersion:
            type: string
            description: The API version supported by the client
          sessionId:
            type: string
            description: The session ID (UUID) to be used in the following messages. The value is generated by the Konnector or the client itself.
          cardConnectionType:
            title: "CardConnectionType"
            type: string
            enum: [ "contact", "contactless", "connector" ]
        required:
          - clientApiVersion
          - sessionId
          - cardConnectionType
        examples:
            - clientApiVersion: "1.0.0"
              sessionId: "6532d3fb-33d7-42e1-a718-3bb7d91e4987"
              cardConnectionType: "contact"
    Scenario:
      payload:
        title: ScenarioPayload
        type: object
        additionalProperties: false
        properties:
          encoded:
            type: string
            description: |
              Base64 encoded BER-TLV structure containing the scenatio to be executed on the smartcard
        required:
          - encoded
            
    ScenarioResult:
      payload:
        title: ScenarioResultPayload
        type: object
        properties:
          responses:
            type: array
            items:
              type: string
              description: |
                Response from the smartcard encoded in hexadecimal characters.
                Contains at least 4 characters (status word).
            description: |
              The responses from the smartcard, one for each command in the scenario
        required:
          - responses

    Token:
      payload:
        title: TokenPayload
        type: object
        properties:
          token:
            type: string
            description: The proof of patient presence token, signed structure.
          pn:
            type: string
            description: Base64 encoded "Prüfnachweis"
          patientId:
            type: string
            description: KVNR, taken from SET with OID id_at_organizationUnitName
          patientName:
            type: string
            description: name, taken from SET with OID id_at_commonName
          insurerId:
            type: string
            description: IKNR, taken from SET with OID id_at_organizationUnitName
          insurerName:
            type: string
            description: name of insurance, taken from SET with OID id_at_organizationName
        required:
          - token
          - patientId
          - patientName
          - insurerId
          - insurerName


